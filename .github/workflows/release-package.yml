name: release-package

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-package:
    runs-on: windows-latest

    env:
      PACKAGE_ID: CS2-STATPLAY
      PACKAGE_VERSION: 0.9.0
      RUNTIME_ID: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CSStat.sln

      - name: Build Release
        run: dotnet build src/CS2Stats.Plugin/CS2Stats.Plugin.csproj -c Release /p:PackageOnBuild=false

      - name: Package Release
        shell: pwsh
        run: ./scripts/package-release.ps1 -Configuration Release -Version $env:PACKAGE_VERSION -PackageId $env:PACKAGE_ID -RuntimeIdentifier $env:RUNTIME_ID

      - name: Verify SHA256 checksum
        shell: pwsh
        run: |
          $expectedLine = Get-Content "artifacts/SHA256SUMS.txt" | Select-String "${env:PACKAGE_ID}-${env:PACKAGE_VERSION}-${env:RUNTIME_ID}.zip"
          if (-not $expectedLine) {
            throw "Checksum entry not found for packaged zip."
          }
          $expectedHash = ($expectedLine.ToString().Split(' ')[0]).Trim()
          $actualHash = (Get-FileHash "artifacts/${env:PACKAGE_ID}-${env:PACKAGE_VERSION}-${env:RUNTIME_ID}.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($expectedHash -ne $actualHash) {
            throw "Checksum verification failed. Expected $expectedHash but got $actualHash"
          }

      - name: Upload Folder Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}-folder
          path: artifacts/${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}-zip
          path: artifacts/${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}.zip

      - name: Upload Checksum Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}-sha256
          path: artifacts/SHA256SUMS.txt