name: release-package

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-package:
    runs-on: windows-latest

    env:
      PACKAGE_ID: CS2-STATPLAY
      PACKAGE_VERSION: 1.0.1
      RUNTIME_ID: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CSStat.sln

      - name: Build Release
        run: dotnet build src/CS2Stats.Plugin/CS2Stats.Plugin.csproj -c Release /p:PackageOnBuild=false

      - name: Package Release
        shell: pwsh
        run: ./scripts/package-release.ps1 -Configuration Release -Version $env:PACKAGE_VERSION -PackageId $env:PACKAGE_ID -RuntimeIdentifier $env:RUNTIME_ID

      - name: Verify SHA256 checksum
        shell: pwsh
        run: |
          $zipNames = @(
            "${env:PACKAGE_ID}-${env:PACKAGE_VERSION}-${env:RUNTIME_ID}.zip",
            "${env:PACKAGE_ID}-${env:PACKAGE_VERSION}-${env:RUNTIME_ID}-update-no-config.zip"
          )

          foreach ($zipName in $zipNames) {
            $expectedLine = Get-Content "artifacts/SHA256SUMS.txt" | Select-String $zipName
            if (-not $expectedLine) {
              throw "Checksum entry not found for packaged zip: $zipName"
            }

            $expectedHash = ($expectedLine.ToString().Split(' ')[0]).Trim()
            $actualHash = (Get-FileHash "artifacts/$zipName" -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($expectedHash -ne $actualHash) {
              throw "Checksum verification failed for $zipName. Expected $expectedHash but got $actualHash"
            }
          }

      - name: Upload Folder Artifact (with config)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}-folder
          path: artifacts/${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}

      - name: Upload Folder Artifact (update no config)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}-update-no-config-folder
          path: artifacts/${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}-update-no-config

      - name: Upload Zip Artifact (with config)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}-zip
          path: artifacts/${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}.zip

      - name: Upload Zip Artifact (update no config)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}-update-no-config-zip
          path: artifacts/${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}-update-no-config.zip

      - name: Upload Checksum Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_ID }}-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_ID }}-sha256
          path: artifacts/SHA256SUMS.txt